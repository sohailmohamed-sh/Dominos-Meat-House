<!DOCTYPE html>
<html lang="en">
<head>  
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Dominos Meat House</title>
    <link rel="stylesheet" href="yarab2.css"/>
    <!-- Font Awesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css"/>
</head>
<body>
   <header class="header">
    <nav class="header--menu">
        <div class="logo">
            <img src="dominos_logo-removebg-preview.png" alt="logo" class="logo-img"/>
        </div>
        <div class="burger--icon">
            <i class="fa-solid fa-bars"></i>
        </div>
        <div class="search--box">
            <i class="fa-solid fa-magnifying-glass"></i>
            <input type="text" placeholder="search">
        </div>
        <div class="menu--icons">
            <i class="fa-solid fa-bowl-food"></i>
            <div class="cart-icon">
                <i class="fa-solid fa-cart-shopping"></i>
                <span>0</span>
            </div>
        </div>
    </nav>
   </header>

   <!-- Cover Section -->
   <section class="cover">
    <div class="cover--overlay">
        <h1>
            <img src="logo_2-removebg-preview.png" alt="Logo" class="h1-image">
        </h1>
        
        <span class="slogan">Where Taste Takes the Fast Lane</span>
    </div>
   </section>

   <main>
       <h2 class="section-heading">Food Menu</h2>
       <div class="menu--list">
           <div class="menu--item">
               <img src="pizza-pizza-transparent-pizza-ai-generated-free-png.webp" alt="Pizza"/>
               <h5>Pizza</h5>
           </div>
           <div class="menu--item">
               <img src="pngtree-burger-food-png-free-download-png-image_13329458.png" alt="Burger"/>
               <h5>Burger</h5>
           </div>
           <div class="menu--item">
               <img src="pngtree-fried-chicken-in-red-bucket-3d-realistic-png-side-view-png-image_11461072.png" alt="Fried Chicken"/>
               <h5>Fried Chicken</h5>
           </div>
       </div>

       <!-- Card Items Section -->
       <h2 class="section-heading">Menu Items</h2>
       <div class="card--list">
           <div class="card">
               <img src="pizza-pizza-transparent-pizza-ai-generated-free-png.webp" alt="Pizza">
               <h4 class="card--title">Pizza</h4>
               <div class="card--price">$15.00</div>
               <i class="fa-solid fa-plus add-to-cart"></i>
           </div>
           <div class="card">
               <img src="pngtree-burger-food-png-free-download-png-image_13329458.png" alt="Burger">
               <h4 class="card--title">Burger</h4>
               <div class="card--price">$12.00</div>
               <i class="fa-solid fa-plus add-to-cart"></i>
           </div>
           <div class="card">
               <img src="pngtree-fried-chicken-in-red-bucket-3d-realistic-png-side-view-png-image_11461072.png" alt="Fried Chicken">
               <h4 class="card--title">Fried Chicken</h4>
               <div class="card--price">$18.00</div>
               <i class="fa-solid fa-plus add-to-cart"></i>
           </div>
       </div>

       <!-- Cart Sidebar Section -->
       <div class="sidebar" id="sidebar">
           <div class="sidebar-close">
               <i class="fa-solid fa-close"></i>
           </div>
           <div class="cart-menu">
               <h3>My Cart</h3>
               <div class="cart-items"></div>
           </div>

           <div class="sidebar--footer">
               <div class="total--amount">
                   <h5>Total</h5>
                   <div class="cart-total">$0.00</div>
               </div>
               <button class="checkout-btn" id="checkout-btn">Checkout</button>
           </div>
       </div>
   </main>

   <script src="document.js"></script>
</body>
</html>
